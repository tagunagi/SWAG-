<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー管理 - SWAG管理システム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Meiryo UI', Meiryo, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        h2 { color: #333; margin-bottom: 15px; font-size: 1.2em; }
        h3 { color: #555; font-size: 1.1em; margin-top: 20px; margin-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #667eea; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .section { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .admin-section { background: #fff3cd; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-family: 'Meiryo UI', Meiryo, sans-serif; }
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; font-family: 'Meiryo UI', Meiryo, sans-serif; }
        .form-group input[type="checkbox"] { margin-right: 5px; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; font-family: 'Meiryo UI', Meiryo, sans-serif; transition: background-color 0.3s; }
        .btn-primary { background-color: #667eea; color: white; }
        .btn-primary:hover { background-color: #5568d3; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-warning { background-color: #ffc107; color: #333; }
        .btn-warning:hover { background-color: #e0a800; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #1e7e34; }
        .btn-block { width: 100%; margin-top: 10px; padding: 12px; }
        .note { font-size: 13px; color: #666; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: 'Meiryo UI', Meiryo, sans-serif; }
        table th, table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        table th { background-color: #667eea; color: white; font-weight: bold; }
        table tr:hover { background-color: #f5f5f5; }
        .actions { display: flex; gap: 10px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 10% auto; padding: 30px; border-radius: 10px; width: 90%; max-width: 500px; font-family: 'Meiryo UI', Meiryo, sans-serif; }
        .modal-content h2 { margin-bottom: 20px; color: #333; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← メイン画面に戻る</a>
        <h1>ユーザー管理</h1>

        <!-- 新規ユーザー追加 -->
        <div class="section">
            <h2>新規ユーザー追加</h2>
            <form id="addUserForm">
                <div class="form-group">
                    <label for="newUserId">ユーザーID *</label>
                    <input type="text" id="newUserId" required>
                </div>
                <div class="form-group">
                    <label for="newUserName">名前 *</label>
                    <input type="text" id="newUserName" required>
                </div>
                <div class="form-group">
                    <label for="newUserSwag">初期SWAG数</label>
                    <input type="number" id="newUserSwag" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="newUserAdmin">
                        管理者権限を付与
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">ユーザーを追加</button>
            </form>
        </div>

        <!-- 管理者機能 -->
        <div class="admin-section">
            <h2>管理者機能</h2>

            <!-- SWAG付与 -->
            <h3>SWAG付与</h3>
            <form id="grantForm">
                <div class="form-group">
                    <label for="grantUserId">対象ユーザーID:</label>
                    <input type="text" id="grantUserId" required>
                </div>
                <div class="form-group">
                    <label for="grantAmount">付与SWAG数:</label>
                    <input type="number" id="grantAmount" min="1" required>
                </div>
                <div class="form-group">
                    <label for="grantReason">理由:</label>
                    <textarea id="grantReason" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">付与</button>
            </form>

            <!-- SWAG減数 -->
            <h3>SWAG減数</h3>
            <form id="deductForm">
                <div class="form-group">
                    <label for="deductUserId">対象ユーザーID:</label>
                    <input type="text" id="deductUserId" required>
                </div>
                <div class="form-group">
                    <label for="deductAmount">減数SWAG数:</label>
                    <input type="number" id="deductAmount" min="1" required>
                </div>
                <div class="form-group">
                    <label for="deductReason">理由:</label>
                    <textarea id="deductReason" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-danger btn-block">減数</button>
            </form>

            <!-- 一括SWAG付与 -->
            <h3>一括SWAG付与</h3>
            <p class="note">複数のユーザーIDを1行に1つずつ入力してください。</p>
            <form id="bulkGrantForm">
                <div class="form-group">
                    <label for="bulkGrantUserIds">対象ユーザーID（1行に1つ）:</label>
                    <textarea id="bulkGrantUserIds" rows="5" placeholder="user001&#10;user002&#10;user003" required></textarea>
                </div>
                <div class="form-group">
                    <label for="bulkGrantAmount">付与SWAG数:</label>
                    <input type="number" id="bulkGrantAmount" min="1" required>
                </div>
                <div class="form-group">
                    <label for="bulkGrantReason">理由:</label>
                    <textarea id="bulkGrantReason" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">一括付与</button>
            </form>

            <!-- 一括ユーザー追加 -->
            <h3>一括ユーザー追加</h3>
            <p class="note">ログインIDを1行に1つずつ入力してください。名前はIDと同じ、SWAG数は0で登録されます。</p>
            <form id="bulkAddForm">
                <div class="form-group">
                    <label for="bulkAddJson">ログインID（1行に1つ）:</label>
                    <textarea id="bulkAddJson" rows="8" placeholder="user001&#10;user002&#10;user003" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">一括追加</button>
            </form>

            <!-- CSVエクスポート -->
            <h3>データエクスポート</h3>
            <p class="note">ログインID・名前・所持SWAGの一覧をCSVでダウンロードします。</p>
            <button id="exportBtn" class="btn btn-success btn-block">CSVエクスポート</button>
        </div>

        <!-- ユーザー一覧テーブル -->
        <h2>登録ユーザー一覧</h2>
        <table>
            <thead>
                <tr>
                    <th>ユーザーID</th>
                    <th>名前</th>
                    <th>SWAG残高</th>
                    <th>管理者</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>

    <!-- 編集モーダル -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>ユーザー編集</h2>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label for="editUserName">名前 *</label>
                    <input type="text" id="editUserName" required>
                </div>
                <div class="form-group">
                    <label for="editUserSwag">SWAG残高</label>
                    <input type="number" id="editUserSwag" min="0" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="editUserAdmin">
                        管理者権限
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">更新</button>
            </form>
        </div>
    </div>

    <script src="user-management.js"></script>
</body>
</html>
