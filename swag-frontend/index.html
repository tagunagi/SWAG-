<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAG管理システム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Meiryo UI', Meiryo, sans-serif; background-color: #f5f5f5; padding: 10px; font-size: 16px; }
        .container { background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h1 { color: #333; font-size: 24px; margin-bottom: 20px; text-align: center; }
        h2 { color: #333; font-size: 20px; margin-top: 30px; margin-bottom: 15px; }
        h3 { color: #555; font-size: 18px; margin-top: 20px; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; font-family: 'Meiryo UI', Meiryo, sans-serif; transition: border-color 0.3s; }
        input[type="text"]:focus, input[type="number"]:focus, textarea:focus { outline: none; border-color: #007bff; }
        textarea { resize: vertical; min-height: 80px; }
        button { width: 100%; background-color: #007bff; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; font-family: 'Meiryo UI', Meiryo, sans-serif; cursor: pointer; margin-top: 10px; transition: background-color 0.3s; }
        button:active { background-color: #0056b3; }
        .logout-btn { background-color: #dc3545; margin-top: 20px; }
        .logout-btn:active { background-color: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: 600; color: #555; }
        .user-info { background-color: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .user-info p { margin: 8px 0; font-size: 16px; }
        .swag-balance { font-size: 28px; font-weight: bold; color: #007bff; }
        .admin-section { background-color: #fff3cd; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .history-section { margin-top: 30px; }
        #managementSection { display: none; }
        #adminMenu { display: none; }
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 15px; }
            h1 { font-size: 20px; }
            h2 { font-size: 18px; }
            h3 { font-size: 16px; }
            table { font-size: 12px; }
            th, td { padding: 8px 4px; }
            .swag-balance { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- ログイン画面 -->
    <div id="loginSection" class="container">
        <h1>SWAG管理システム</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginId">Login ID:</label>
                <input type="text" id="loginId" required>
            </div>
            <button type="submit">ログイン</button>
        </form>
    </div>

    <!-- SWAG管理画面 -->
    <div id="managementSection" class="container">
        <h1>SWAG管理</h1>

        <!-- ユーザー情報 -->
        <div class="user-info">
            <p><strong>ユーザー名:</strong> <span id="userName"></span></p>
            <p><strong>現在のSWAG:</strong> <span id="swagBalance" class="swag-balance"></span></p>
            <button id="logoutBtn" class="logout-btn">ログアウト</button>
        </div>

        <!-- SWAG使用 -->
        <h2>SWAG使用</h2>
        <form id="useForm">
            <div class="form-group">
                <label for="useAmount">使用SWAG数:</label>
                <input type="number" id="useAmount" min="1" required>
            </div>
            <div class="form-group">
                <label for="useReason">理由（任意）:</label>
                <textarea id="useReason" rows="3"></textarea>
            </div>
            <button type="submit">使用</button>
        </form>

        <!-- 管理者メニュー -->
        <div id="adminMenu" class="admin-section">
            <h2>管理者メニュー</h2>
            <div style="margin-bottom: 20px;">
                <a id="userMgmtLink" href="user-management.html" style="display: inline-block; padding: 12px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px; font-family: 'Meiryo UI', Meiryo, sans-serif;">ユーザー管理画面を開く</a>
            </div>
        </div>

        <!-- 履歴表示 -->
        <div class="history-section">
            <h2>使用履歴</h2>
            <table>
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>SWAG数</th>
                        <th>理由</th>
                        <th>残高</th>
                    </tr>
                </thead>
                <tbody id="useHistoryBody">
                    <tr><td colspan="4">履歴がありません</td></tr>
                </tbody>
            </table>

            <h2>付与履歴</h2>
            <table>
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>SWAG数</th>
                        <th>理由</th>
                        <th>付与者</th>
                        <th>残高</th>
                    </tr>
                </thead>
                <tbody id="grantHistoryBody">
                    <tr><td colspan="5">履歴がありません</td></tr>
                </tbody>
            </table>

            <h2>減数履歴</h2>
            <table>
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>SWAG数</th>
                        <th>理由</th>
                        <th>減数者</th>
                        <th>残高</th>
                    </tr>
                </thead>
                <tbody id="deductHistoryBody">
                    <tr><td colspan="5">履歴がありません</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
